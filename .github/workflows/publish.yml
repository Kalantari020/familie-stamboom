name: Publiceer stamboom

on:
  push:
    paths:
      - 'data/publish-state.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Update START_DATA in app.js
        run: |
          node -e "
            const fs = require('fs');
            const state = JSON.parse(fs.readFileSync('data/publish-state.json', 'utf8'));
            const js    = fs.readFileSync('app.js', 'utf8');
            const newData = '// __START_DATA_BEGIN__\nconst START_DATA = ' + JSON.stringify(state, null, 2) + ';\n// __START_DATA_END__';
            const newJs = js.replace(/\/\/ __START_DATA_BEGIN__[\s\S]*?\/\/ __START_DATA_END__/, newData);
            if (newJs === js) { console.error('Marker niet gevonden!'); process.exit(1); }
            fs.writeFileSync('app.js', newJs);
            console.log('app.js bijgewerkt met', state.persons?.length, 'personen');
          "

      - name: Deploy naar Netlify
        run: npx netlify-cli@latest deploy --prod --dir . --auth ${{ secrets.NETLIFY_TOKEN }} --site ${{ secrets.NETLIFY_SITE_ID }}
