name: Publiceer stamboom

on:
  push:
    paths:
      - 'data/publish-state.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update START_DATA in app.js
        run: |
          node -e "
            const fs = require('fs');
            const raw = fs.readFileSync('data/publish-state.json', 'utf8');
            const state = JSON.parse(raw);
            console.log('Personen:', state.persons?.length, '| Relaties:', state.relationships?.length);

            const js = fs.readFileSync('app.js', 'utf8');
            if (!js.includes('__START_DATA_BEGIN__')) {
              console.error('FOUT: marker niet gevonden in app.js');
              process.exit(1);
            }

            const newData =
              '// __START_DATA_BEGIN__\n' +
              'const START_DATA = ' + JSON.stringify(state, null, 2) + ';\n' +
              '// __START_DATA_END__';

            const newJs = js.replace(
              /\/\/ __START_DATA_BEGIN__[\s\S]*?\/\/ __START_DATA_END__/,
              newData
            );

            fs.writeFileSync('app.js', newJs, 'utf8');
            console.log('app.js bijgewerkt');
          "

      - name: Maak ZIP en deploy naar Netlify
        run: |
          # Maak netlify/functions map
          mkdir -p netlify/functions

          # Maak ZIP van de site bestanden
          zip -j deploy.zip index.html style.css app.js netlify.toml
          zip deploy.zip netlify/functions/publish.js

          echo "ZIP gemaakt ($(du -sh deploy.zip | cut -f1))"

          # Deploy via Netlify API
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_TOKEN }}" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/deploys")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY" | head -c 300

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Deploy mislukt!"
            exit 1
          fi

          echo "Gepubliceerd!"
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
