name: Publiceer stamboom

on:
  push:
    paths:
      - 'data/publish-state.json'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update START_DATA in app.js
        run: |
          node -e "
            const fs = require('fs');
            const raw = fs.readFileSync('data/publish-state.json', 'utf8');
            const state = JSON.parse(raw);
            console.log('Personen:', state.persons?.length, '| Relaties:', state.relationships?.length);

            const js = fs.readFileSync('app.js', 'utf8');
            if (!js.includes('__START_DATA_BEGIN__')) {
              console.error('FOUT: marker niet gevonden in app.js');
              process.exit(1);
            }

            const newData =
              '// __START_DATA_BEGIN__\n' +
              'const START_DATA = ' + JSON.stringify(state, null, 2) + ';\n' +
              '// __START_DATA_END__';

            const newJs = js.replace(
              /\/\/ __START_DATA_BEGIN__[\s\S]*?\/\/ __START_DATA_END__/,
              newData
            );

            fs.writeFileSync('app.js', newJs, 'utf8');
            console.log('app.js bijgewerkt');
          "

      - name: Commit bijgewerkte app.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.js
          git diff --staged --quiet || git commit -m "Auto: START_DATA bijgewerkt [skip ci]"
          git push
