<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Forceer altijd verse index.html: voorkomt dat mobiele browsers een
       oude versie tonen waarin nog naar oude app.js?v=X verwezen wordt.
       Met deze tags vraagt de browser elke pagina-load opnieuw of er een
       nieuwere versie is. De ?v=N busters zorgen daarna voor app.js/style.css. -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Familie Stamboom</title>
  <link rel="stylesheet" href="style.css?v=87">
  <script>
    window.onerror = function(msg, src, line, col, err) {
      var d = document.createElement('div');
      d.style = 'position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;color:#c00;padding:20px;font:14px/1.5 monospace;z-index:99999;overflow:auto;';
      d.textContent = 'FOUT: ' + msg + '\nBestand: ' + src + '\nRegel: ' + line + ':' + col + (err ? '\n' + err.stack : '');
      document.body.appendChild(d);
    };
    window.addEventListener('unhandledrejection', function(e) {
      var d = document.createElement('div');
      d.style = 'position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;color:#900;padding:20px;font:14px/1.5 monospace;z-index:99999;overflow:auto;';
      d.textContent = 'PROMISE FOUT:\n' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason));
      document.body.appendChild(d);
    });
  </script>
</head>
<body>

  <!-- TOEGANGSSCHERM -->
  <div id="pin-screen">
    <div id="pin-box">
      <div id="pin-logo">🌳</div>
      <h1 id="pin-title">Familie Stamboom</h1>
      <p id="pin-subtitle">Voer de toegangscode in</p>
      <div id="pin-dots">
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
      </div>
      <div id="pin-error"></div>
      <div id="pin-keypad">
        <button class="pin-key" data-val="1">1</button>
        <button class="pin-key" data-val="2">2</button>
        <button class="pin-key" data-val="3">3</button>
        <button class="pin-key" data-val="4">4</button>
        <button class="pin-key" data-val="5">5</button>
        <button class="pin-key" data-val="6">6</button>
        <button class="pin-key" data-val="7">7</button>
        <button class="pin-key" data-val="8">8</button>
        <button class="pin-key" data-val="9">9</button>
        <button class="pin-key pin-clear" data-val="clear" aria-label="Wissen">⌫</button>
        <button class="pin-key" data-val="0">0</button>
        <button class="pin-key pin-ok" data-val="ok" aria-label="Bevestigen">OK</button>
      </div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div id="toolbar">
    <div class="toolbar-left">
      <button id="btn-sidebar-toggle" class="btn icon mobile-only" title="Menu">☰</button>
      <span class="app-title">Familie Stamboom</span>
      <button id="btn-add-person" class="btn primary desktop-only">+ Persoon</button>
      <button id="btn-add-relation" class="btn secondary desktop-only">+ Relatie</button>
    </div>
    <div class="toolbar-center">
      <button id="btn-zoom-out" class="btn icon" title="Uitzoomen">−</button>
      <span id="zoom-label">100%</span>
      <button id="btn-zoom-in" class="btn icon" title="Inzoomen">+</button>
      <button id="btn-zoom-fit" class="btn small" title="Alles tonen">Passend</button>
      <button id="btn-go-top" class="btn small" title="Naar stamhoofd">⬆ Top</button>
      <button id="btn-smart-view" class="btn small" title="Smart View: compact overzicht">🔍 Smart</button>
      <button id="btn-pdf" class="btn small" title="Download als PDF">📄 PDF</button>
    </div>
    <div class="toolbar-right desktop-only">
      <button id="btn-export" class="btn small">Exporteer JSON</button>
      <button id="btn-import" class="btn small">Importeer JSON</button>
      <input type="file" id="file-input" accept=".json" style="display:none">
      <button id="btn-reset" class="btn small danger" title="Reset naar startdata">Reset</button>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast-container"></div>

  <!-- (publiceer modal verwijderd) -->

  <!-- SLIM KOPPELEN MODAL -->
  <div id="modal-smartlink" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h2>🔗 Slim koppelen</h2>
      <p id="smartlink-intro" style="color:var(--text-muted);font-size:13px;margin-bottom:16px"></p>
      <div id="smartlink-list"></div>
      <div class="form-actions">
        <button id="btn-smartlink-close" class="btn secondary">Sluiten</button>
      </div>
    </div>
  </div>

  <!-- SIDEBAR OVERLAY (mobiel) -->
  <div id="sidebar-overlay"></div>

  <!-- MAIN -->
  <div id="main">

    <!-- SIDEBAR -->
    <div id="sidebar">
      <input type="text" id="search" placeholder="Zoek persoon of stamboom..." autocomplete="off">

      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <span class="sidebar-section-title">STAMBOMEN</span>
          <button id="btn-new-family" class="btn small" title="Nieuwe familie starten">+ Nieuw</button>
        </div>
        <div id="tree-list"></div>
      </div>

      <div class="sidebar-divider"></div>

      <div class="sidebar-section grows">
        <div class="sidebar-section-header">
          <span class="sidebar-section-title">Verjaardagen</span>
          <span class="sidebar-section-sub">🌟 deze week</span>
        </div>
        <div id="birthday-list"></div>
      </div>

      <div class="sidebar-divider"></div>

      <div class="sidebar-section grows">
        <div class="sidebar-section-header">
          <span class="sidebar-section-title">PERSONEN</span>
          <span id="stats"></span>
        </div>
        <div id="person-list"></div>
      </div>

      <!-- Mobiele tools (Fix 2: toolbar-right knoppen in sidebar) -->
      <div class="sidebar-tools">
        <span class="sidebar-section-title">EXTRA</span>
        <button class="btn primary" onclick="document.getElementById('btn-add-person').click()">+ Persoon</button>
        <button class="btn secondary" onclick="document.getElementById('btn-add-relation').click()">+ Relatie</button>
        <button class="btn small secondary" onclick="document.getElementById('btn-smart-view').click()">🔍 Smart View</button>
        <button class="btn small secondary" onclick="document.getElementById('btn-pdf').click()">📄 PDF</button>
        <button class="btn small secondary" onclick="document.getElementById('btn-export').click()">Exporteer JSON</button>
        <button class="btn small secondary" onclick="document.getElementById('btn-import').click()">Importeer JSON</button>
        <button class="btn small danger" onclick="document.getElementById('btn-reset').click()">Reset</button>
      </div>
    </div>

    <!-- CANVAS WRAPPER -->
    <div id="canvas-wrapper">
      <button id="btn-back-overview" class="btn primary hidden">← Overzicht</button>
      <div id="canvas">
        <svg id="svg-lines" xmlns="http://www.w3.org/2000/svg"></svg>
        <div id="cards-container"></div>
      </div>
    </div>

  </div>

  <!-- MODAL: PERSOON TOEVOEGEN / BEWERKEN -->
  <div id="modal-person" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h2 id="modal-person-title">Persoon toevoegen</h2>
      <form id="form-person" autocomplete="off">
        <div class="form-row photo-row">
          <div id="photo-preview" class="photo-preview"></div>
          <label class="photo-label">
            <input type="file" id="photo-input" accept="image/*" style="display:none">
            <span id="photo-btn" class="btn small">Foto kiezen</span>
            <span id="photo-remove" class="btn small danger" style="display:none">Verwijder foto</span>
          </label>
        </div>
        <div class="form-row">
          <label>
            Volledige naam *
            <input type="text" name="name" required placeholder="Voornaam Achternaam">
          </label>
        </div>
        <div class="form-row two-col">
          <label>
            Geslacht
            <select name="gender">
              <option value="m">Man</option>
              <option value="f">Vrouw</option>
              <option value="?">Onbekend</option>
            </select>
          </label>
          <label>
            Familie
            <input type="text" name="family" placeholder="bijv. Sayedi">
          </label>
        </div>
        <div class="form-row two-col">
          <label>
            Geboortedatum
            <input type="text" name="birthdate" placeholder="1990, 15-05-1990 of 1990-05-15">
          </label>
          <label>
            Overlijdensdatum
            <input type="text" name="deathdate" placeholder="Leeg = nog in leven">
          </label>
        </div>
        <div class="form-row two-col">
          <label>
            Geboorte-volgorde
            <input type="number" name="birthOrder" min="1" placeholder="bijv. 1, 2, 3...">
          </label>
          <label>
            Pleeg-volgorde
            <input type="number" name="socialBirthOrder" min="1" placeholder="volgorde bij pleegouder">
          </label>
        </div>
        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" name="deceased" id="chk-deceased">
            Overleden
          </label>
        </div>
        <div class="form-row">
          <label>
            Notities
            <textarea name="notes" rows="2" placeholder="Extra informatie..."></textarea>
          </label>
        </div>

        <!-- Relaties sectie — alleen zichtbaar bij bewerken -->
        <div id="rel-edit-section" style="display:none">
          <div class="sidebar-divider" style="margin:14px 0 10px"></div>
          <div class="detail-section-title" style="margin-bottom:10px">Relaties</div>
          <div id="rel-edit-content"></div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn primary" id="btn-person-submit">Opslaan</button>
          <button type="button" class="btn secondary" id="btn-person-cancel">Annuleer</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL: RELATIE TOEVOEGEN -->
  <div id="modal-relation" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h2>Relatie toevoegen</h2>
      <form id="form-relation" autocomplete="off">
        <div class="form-row">
          <label>
            Type relatie
            <select name="type" id="rel-type">
              <option value="parent-child">Ouder → Kind</option>
              <option value="partner">Partner / Huwelijk</option>
              <option value="social-parent">Sociale ouder → Kind</option>
            </select>
          </label>
        </div>

        <div id="rel-fields-parent-child">
          <div class="form-row">
            <label>
              Ouder
              <select name="parentId" id="sel-parent"></select>
            </label>
          </div>
          <div class="form-row">
            <label>
              Kind
              <select name="childId" id="sel-child"></select>
            </label>
          </div>
        </div>

        <div id="rel-fields-partner" class="hidden">
          <div class="form-row">
            <label>
              Persoon 1
              <select name="person1Id" id="sel-p1"></select>
            </label>
          </div>
          <div class="form-row">
            <label>
              Persoon 2
              <select name="person2Id" id="sel-p2"></select>
            </label>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn primary">Toevoegen</button>
          <button type="button" class="btn secondary" id="btn-relation-cancel">Annuleer</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL: BEVESTIGING VERWIJDEREN -->
  <div id="modal-confirm" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-content small">
      <h2>Bevestigen</h2>
      <p id="confirm-message"></p>
      <div class="form-actions">
        <button id="btn-confirm-yes" class="btn danger">Verwijderen</button>
        <button id="btn-confirm-no" class="btn secondary">Annuleer</button>
      </div>
    </div>
  </div>

  <!-- MODAL: SAMENVOEGEN -->
  <div id="modal-merge" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-content small">
      <h2>🔗 Samenvoegen</h2>
      <div id="merge-person-a"></div>
      <p style="color:var(--text-muted);font-size:13px;margin:12px 0">Zoek de dubbele persoon om samen te voegen:</p>
      <input id="merge-search" type="text" placeholder="Naam zoeken..." class="form-input">
      <div id="merge-results" style="margin-top:8px;max-height:200px;overflow-y:auto"></div>
      <div id="merge-preview" style="display:none;margin-top:12px;padding:10px;background:#1e3a5f;border-radius:8px;font-size:13px"></div>
      <div class="form-actions" style="margin-top:12px">
        <button id="btn-merge-confirm" class="btn danger" style="display:none">✓ Samenvoegen</button>
        <button id="btn-merge-cancel" class="btn secondary">Annuleren</button>
      </div>
    </div>
  </div>

  <!-- MODAL: PERSOON DETAIL -->
  <div id="modal-detail" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div id="detail-content"></div>
      <div class="form-actions">
        <button id="btn-detail-edit" class="btn primary">Bewerken</button>
        <button id="btn-detail-close" class="btn secondary">Sluiten</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <script src="app.js?v=610"></script>
</body>
</html>
